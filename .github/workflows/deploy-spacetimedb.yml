name: Deploy SpacetimeDB Module
on:
  workflow_dispatch:
  push:
    branches: [main, '**']
    paths:
      - 'spacetimedb/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SpacetimeDB CLI
        run: curl -sSf https://install.spacetimedb.com | sh -s -- --yes

      - name: Add SpacetimeDB to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install module dependencies
        run: cd spacetimedb && npm ci

      - name: Authenticate
        run: spacetime login --token ${{ secrets.SPACETIMEDB_TOKEN }}

      - name: Set module name
        id: module
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=redemption-multiplayer" >> $GITHUB_OUTPUT
          else
            echo "name=redemption-multiplayer-dev" >> $GITHUB_OUTPUT
          fi

      - name: Publish module
        run: spacetime publish ${{ steps.module.outputs.name }} --module-path spacetimedb --server maincloud --no-config --yes
